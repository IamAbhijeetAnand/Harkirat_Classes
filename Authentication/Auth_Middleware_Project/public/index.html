        const username = document.getElementById("signup-username").value;

        //we await because it is sending the request to a backend server
        //It can take lot of times sometime
        //It will return you a promise function
        const response = await axios.post("http://localhost:3000/signup", {
            username: username,
            password: password
        });
        alert("You are signed Up!");
    }

    //Update SignIn with the help of Chatgpt
    async function signin() {
    const username = document.getElementById("signin-username").value;
    const password = document.getElementById("signin-password").value;

    const response = await axios.post("http://localhost:3000/signin", {
        username,
        password
    });

    // overwrite old token
    localStorage.setItem("token", response.data.token);

    // clear old UI first
    document.getElementById("information").innerHTML = "";

    // fetch fresh data
    await getUserInformation();

    alert("Signed in successfully!");
}

    //Update getUserInformation with the help of Chatgpt
    // This function fetches logged-in user information from backend
// It uses the JWT token stored in localStorage
async function getUserInformation() {

    // Step 1: Get the token from browser localStorage
    // localStorage keeps data even after page refresh
    const token = localStorage.getItem("token");

    // Step 2: If no token exists, it means user is not logged in
    // So we clear the UI and stop execution
    if (!token) {
        document.getElementById("information").innerHTML = "";
        return; // Exit the function early
    }

    // Step 3: Send GET request to backend "/me" route
    // We send the token in headers so backend can verify the user
    const response = await axios.get("http://localhost:3000/me", {
        headers: {
            token: token   // Backend will read this using req.headers.token
        }
    });

    // Step 4: After backend verifies token,
    // it sends back user data (username & password in your practice case)
    // We display that data inside the div with id="information"
    document.getElementById("information").innerHTML =
        "Username: " + response.data.username +
        " Password: " + response.data.password;
}

    if (localStorage.getItem("token")) {
    getUserInformation();
}
